# Nazwa klawiatury
CONFIG_ZMK_KEYBOARD_NAME="Zyra FT"

# BT - moc nadawcza
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep
CONFIG_ZMK_SLEEP=y

# Put keyboard to deep sleep after 1 hour of inactivity (3600000 ms), see above setting
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# ZMK Studio (shield cradio ma już feature 'studio' w upstream)
CONFIG_ZMK_STUDIO=y

# Add mouse functionality
CONFIG_ZMK_POINTING=y

# Eager debouncing (jak w innych klawiaturach FT)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
